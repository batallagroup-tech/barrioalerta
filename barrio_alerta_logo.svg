<svg width="100%" viewBox="0 0 690 690" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">BarrioAlerta Logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo de BarrioAlerta con escudo neón azul sobre fondo azul oscuro profundo</desc>
<defs>
  <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#0d1f3c"/>
    <stop offset="100%" stop-color="#060d1a"/>
  </radialGradient>
  <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a6fff" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#1a6fff" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow1">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="textGlow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="680" height="680" fill="url(#bgGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<ellipse cx="340" cy="300" rx="200" ry="180" fill="url(#shieldGlow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<path d="M340 130 C340 130 220 175 220 175 L220 310 C220 390 280 445 340 470 C400 445 460 390 460 310 L460 175 Z" fill="#0a2550" stroke="#0a4fff" stroke-width="3" filter="url(#glow2)" style="fill:rgb(10, 37, 80);stroke:rgb(10, 79, 255);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<path d="M340 130 C340 130 220 175 220 175 L220 310 C220 390 280 445 340 470 C400 445 460 390 460 310 L460 175 Z" fill="none" stroke="#4d9fff" stroke-width="1.5" filter="url(#glow1)" style="fill:none;stroke:rgb(77, 159, 255);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<path d="M340 155 C340 155 238 195 238 195 L238 312 C238 381 292 431 340 452 C388 431 442 381 442 312 L442 195 Z" fill="none" stroke="#2070e0" stroke-width="1" opacity="0.6" style="fill:none;stroke:rgb(32, 112, 224);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="340" y="555" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" filter="url(#textGlow)" letter-spacing="-1" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, sans-serif;font-size:72px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">BARRIO</text>

<text x="340" y="555" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff" letter-spacing="-1" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, sans-serif;font-size:72px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">BARRIO</text>

<text x="340" y="625" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" font-style="italic" text-anchor="middle" fill="#2080ff" filter="url(#glow2)" letter-spacing="-1" style="fill:rgb(32, 128, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, sans-serif;font-size:72px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">ALERTA</text>

<text x="340" y="625" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" font-style="italic" text-anchor="middle" fill="#5aadff" filter="url(#glow1)" letter-spacing="-1" style="fill:rgb(90, 173, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, sans-serif;font-size:72px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">ALERTA</text>

<text x="340" y="625" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" font-style="italic" text-anchor="middle" fill="#8fcfff" letter-spacing="-1" style="fill:rgb(143, 207, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, sans-serif;font-size:72px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">ALERTA</text>
